name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      # تحديث نسخة جافا إلى 17 لحل مشاكل مكتبات التشفير bcprov
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Web Project
        run: npm run build # أو الأمر الذي تستخدمه لبناء واجهة الويب

      - name: Initialize Capacitor
        run: npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          # إعطاء صلاحيات التنفيذ لملف gradlew
          chmod +x gradlew
          # تنظيف الملفات المؤقتة والتالفة
          ./gradlew clean
          # بناء ملف APK (Debug) مع تعطيل الذاكرة المؤقتة للتأكد من نظافة البناء
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
