name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Web Project
        run: npm run build --if-present

      - name: Force Initialize Capacitor
        run: |
          # إنشاء ملف إعدادات افتراضي إذا كان مفقوداً لتجنب خطأ appId
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.amir.digitaltwin", "appName": "DigitalTwin", "webDir": "dist"}' > capacitor.config.json
          fi
          
          # إضافة المنصة والمزامنة مع تجاهل الأخطاء إذا كانت موجودة مسبقاً
          npx cap add android || true
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          # التأكد من وجود مجلد أندرويد قبل البدء
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --no-daemon
          else
            echo "Error: Android folder not found!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
