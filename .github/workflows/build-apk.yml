name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      # تحديث الإصدار إلى 21 كما يطلب مشروعك الآن
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Web Project
        run: npm run build --if-present

      - name: Initialize Capacitor
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.amir.digitaltwin", "appName": "DigitalTwin", "webDir": "dist"}' > capacitor.config.json
          fi
          npx cap add android || true
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          # إضافة بارامترات لضمان التوافق مع نسخة جافا
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.java.home=$JAVA_HOME_21_X64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
