name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install sharp @auth0/auth0-react
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Generate Application Icons
        run: node generate-icons.js

      - name: Build Web Project
        run: npm run build

      - name: Initialize and Force Assets
        run: |
          # تهيئة أندرويد وإضافة المنصة
          npx cap init "DigitalTwin" "com.lamouri.goldentwin" --web-dir dist
          npx cap add android
          
          # تثبيت وتوليد الأيقونات
          npm install @capacitor/assets --save-dev
          npx capacitor-assets generate --android
          
          # مزامنة الملفات ونسخها للمجلدات الصحيحة تلقائياً
          npx cap copy android
          npx cap update android

      - name: Total Conflict Resolution (Internal Injection)
        run: |
          # حل تضارب Kotlin بفرض النسخة 1.9.10 في ملف البناء
          if [ -f android/app/build.gradle ]; then
            echo 'configurations.all { resolutionStrategy { force "org.jetbrains.kotlin:kotlin-stdlib:1.9.10"; force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10" } }' >> android/app/build.gradle
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android Project
        run: |
          cd android
          # إعطاء صلاحية التنفيذ لملف Gradle
          chmod +x gradlew
          ./gradlew clean
          # البدء في بناء الـ APK مع إعدادات الذاكرة وحل التضارب
          ./gradlew assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -PkotlinVersion=1.9.10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
