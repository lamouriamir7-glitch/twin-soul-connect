name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install sharp @auth0/auth0-react
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Initialize and Force Assets
        run: |
          # 1. تهيئة أندرويد باسم حزمة جديد كلياً لكسر ذاكرة الهاتف
          npx cap init "DigitalTwin" "com.lamouri.goldentwin" --web-dir dist
          npx cap add android
          
          # 2. معالجة صورة الـ AI برمجياً لتنظيفها وتحويلها لـ PNG قياسي
          mkdir -p resources
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const source = fs.existsSync('public/1777573834038.png') ? 'public/1777573834038.png' : 'public/Brain_raw.png';
          sharp(source)
            .ensureAlpha()
            .resize(1024, 1024)
            .toFormat('png
