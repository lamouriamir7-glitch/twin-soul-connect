name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        
      - name: Install Dependencies
        run: |
          npm install --force
          npm install sharp @auth0/auth0-react
          npm install @capacitor/cli @capacitor/core @capacitor/android


      - name: Generate Application Icons
        run: node generate-icons.js

      # --- ضع السطور الجديدة هنا ---
      - name: Update Android Assets
        run: |
          npm install @capacitor/assets --save-dev
          npx capacitor-assets generate --android
      # ----------------------------

      - name: Build Web Project
        run: npm run build


      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Web Project
        run: npm run build --if-present

      - name: Initialize Capacitor
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.amir.digitaltwin", "appName": "DigitalTwin", "webDir": "dist"}' > capacitor.config.json
          fi
          npx cap add android || true
          npx cap sync android

      - name: Total Conflict Resolution (The Hammer)
        run: |
          cd android
          
          # 1. إجبار النظام على استخدام نسخة واحدة في ملف الخصائص
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "kotlin.stdlib.default.dependency=false" >> gradle.properties

          # 2. حقن "استراتيجية الحل" في ملف build.gradle الرئيسي
          # هذا الأمر يجبر Gradle على اختيار نسخة 1.9.10 لأي مكتبة Kotlin متصارعة
          sed -i '/allprojects {/a \    configurations.all {\n        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib:1.9.10"\n        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10"\n        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10"\n    }' build.gradle

          # 3. حذف ملفات الموديول المتكررة من الحزمة النهائية
          sed -i '/android {/a \    packagingOptions {\n        resources {\n            pickFirst "META-INF/*.kotlin_module"\n            exclude "META-INF/kotlin-stdlib-jdk7.kotlin_module"\n            exclude "META-INF/kotlin-stdlib-jdk8.kotlin_module"\n        }\n    }' app/build.gradle

          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.java.home=$JAVA_HOME_21_X64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
