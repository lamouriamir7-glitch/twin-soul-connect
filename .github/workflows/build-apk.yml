name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install sharp @auth0/auth0-react
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Generate Application Icons
        run: node generate-icons.js

      - name: Build Web Project
        run: npm run build

      - name: Initialize and Force Assets
        run: |
          # 1. تهيئة الأندرويد
          npx cap init "DigitalTwin" "com.lamouri.twinsoul" --web-dir dist
          npx cap add android
          
          # 2. توليد الأيقونات الجديدة
          npm install @capacitor/assets --save-dev
          npx capacitor-assets generate --android
          
          # 3. مسح الأيقونات الزرقاء الافتراضية من المجلدات (لضمان التغيير)
          rm -rf android/app/src/main/res/mipmap-*
          
          # 4. حقن الأيقونات الذهبية يدوياً في المسار الصحيح
          cp -r resources/android/icon/* android/app/src/main/res/ || true
          
          # 5. مزامنة التعديلات
          npx cap copy android
          npx cap update android

      - name: Total Conflict Resolution (Internal Injection)
        run: |
          # حل تضارب المكتبات من داخل ملفات أندرويد مباشرة
          echo 'configurations.all { resolutionStrategy { force "org.jetbrains.kotlin:kotlin-stdlib:1.9.10"; force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10" } }' >> android/app/build.gradle

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android Project
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          # تنفيذ البناء مع فرض نسخة Kotlin وتأمين الذاكرة
          ./gradlew assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -PkotlinVersion=1.9.10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
