name: Auto Generate Icons

on:
  push:
    paths:
      - 'public/brain_raw.png' # سيعمل فقط عندما تغير الصورة

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Sharp
        run: npm install sharp

      - name: Run Script
        run: node generate-icons.js

      - name: Commit Icons
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: generate application icons from brain_raw.png"
          file_pattern: 'public/*.png'
